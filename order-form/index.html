<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Burnett's Butcher Shop — Order Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --tan:   #c49a76;
            --dark:  #111418;
            --card:  rgba(15, 18, 22, 0.78);
            --border: rgba(196,154,118,0.25);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            min-height: 100vh;
            /* Full-page background */
            background-image: url('images/bg.jpg');
            background-size: cover;
            background-position: center 20%;
            background-attachment: fixed;
        }

        /* Dark overlay so text stays readable */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(8, 10, 13, 0.62);
            z-index: 0;
            pointer-events: none;
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 20px 40px;
        }
        .hero img.logo {
            height: 160px;
            width: auto;
            display: block;
            margin: 0 auto;
        }
        .hero img.logo.try2 { display: none; }
        .hero img.logo.try3 { display: none; }
        .hero img.logo.try4 { display: none; }

        #logo-text {
            display: none;
        }
        #logo-text h1 {
            font-size: 52px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
            line-height: 1;
        }
        #logo-text p {
            color: var(--tan);
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .hero-divider {
            width: 60px; height: 2px;
            background: var(--tan);
            margin: 20px auto 12px;
        }
        .hero-sub {
            color: var(--tan);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ── FORM WRAPPER ── */
        .form-wrap {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px 80px;
        }

        /* ── SECTION TITLE ── */
        .section-title {
            color: var(--tan);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* ── PRODUCT CARDS ── */
        .products { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        .product-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .product-card.selected {
            border-color: var(--tan);
            background: rgba(196,154,118,0.12);
        }
        .product-card input[type="checkbox"] {
            position: absolute;
            opacity: 0; width: 0; height: 0;
        }
        .check-box {
            width: 24px; height: 24px;
            border: 2px solid #555;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .product-card.selected .check-box {
            background: var(--tan);
            border-color: var(--tan);
        }
        .check-box svg { display: none; }
        .product-card.selected .check-box svg { display: block; }

        .product-img {
            width: 72px; height: 72px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .product-info { flex: 1; min-width: 0; }
        .product-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--tan);
            margin-bottom: 2px;
            line-height: 1.3;
        }
        .product-price {
            font-size: 13px;
            color: #aaa;
        }

        /* Qty always visible */
        .qty-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .qty-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .qty-select {
            background: rgba(15,18,22,0.85);
            border: 1px solid var(--border);
            color: var(--tan);
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 66px;
            -webkit-appearance: none;
            text-align: center;
        }
        .qty-select:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── TOTAL ── */
        .total-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 28px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .total-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; }
        .total-amount { font-size: 28px; font-weight: 700; color: var(--tan); }

        /* ── FORM SECTIONS ── */
        .form-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .fields { display: flex; flex-direction: column; gap: 16px; }

        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group label {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--tan);
        }
        .field-group input {
            background: rgba(8,10,13,0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            padding: 13px 14px;
            width: 100%;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        .field-group input:focus {
            outline: none;
            border-color: var(--tan);
        }
        .field-group input::placeholder { color: #555; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ── TIME SLOT PICKER ── */
        .time-picker-wrap { display: flex; flex-direction: column; gap: 8px; }
        .time-picker-label {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--tan);
        }
        .time-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .time-slot {
            background: rgba(8,10,13,0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .time-slot:hover { border-color: var(--tan); color: var(--tan); }
        .time-slot.active {
            background: var(--tan);
            border-color: var(--tan);
            color: #0f1216;
            font-weight: 700;
        }
        .time-slot.unavailable {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        /* hidden input to hold selected time */
        #pickup-time { display: none; }

        /* ── SUBMIT ── */
        .submit-btn {
            width: 100%;
            padding: 17px;
            background: var(--tan);
            color: #0f1216;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── SUCCESS ── */
        .success-screen {
            display: none;
            text-align: center;
            padding: 80px 20px;
            position: relative;
            z-index: 1;
        }
        .success-screen.show { display: block; }
        .success-icon {
            width: 80px; height: 80px;
            background: rgba(196,154,118,0.15);
            border: 2px solid var(--tan);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }
        .success-screen h2 { font-size: 28px; color: var(--tan); margin-bottom: 12px; }
        .success-screen p { color: #aaa; line-height: 1.7; font-size: 16px; }

        /* ── ERROR ── */
        .error-msg {
            display: none;
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            color: #f87171;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .error-msg.show { display: block; }

        /* ── MODE TOGGLE ── */
        .mode-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .mode-btn {
            padding: 12px;
            border: 1px solid transparent;
            border-radius: 10px;
            background: transparent;
            color: #888;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: var(--tan);
            color: #0f1216;
            border-color: var(--tan);
        }

        /* ── CUSTOM FORM ── */
        .field-group textarea {
            background: rgba(8,10,13,0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            padding: 13px 14px;
            width: 100%;
            transition: border-color 0.2s;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        .field-group textarea:focus {
            outline: none;
            border-color: var(--tan);
        }
        .field-group textarea::placeholder { color: #555; }

        @media (max-width: 480px) {
            .field-row { grid-template-columns: 1fr; }
            .product-img { width: 60px; height: 60px; }
            .hero img.logo { height: 130px; }
            #logo-text h1 { font-size: 40px; }
        }
    </style>
</head>
<body>

    <!-- Hero -->
    <div class="hero">
        <img class="logo try1" src="images/main-logo.png" alt="Burnett's Butcher Shop"
             onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">

        <div id="logo-text">
            <h1>Burnett's</h1>
            <p>Butcher Shop</p>
        </div>

        <div class="hero-divider"></div>
        <p class="hero-sub">Click &amp; Collect — Order Online</p>
    </div>

    <!-- Main Form -->
    <div class="form-wrap">

        <!-- Success screen -->
        <div class="success-screen" id="success">
            <div class="success-icon">✓</div>
            <h2>Order Received!</h2>
            <p>Thanks, <span id="success-name"></span>.<br>
               Your order is in — we'll be in touch<br>
               to confirm shortly.</p>
        </div>

        <!-- Form -->
        <form id="order-form">

            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button type="button" class="mode-btn active" id="btn-package" onclick="setMode('package')">Package Order</button>
                <button type="button" class="mode-btn" id="btn-custom" onclick="setMode('custom')">Custom Request</button>
            </div>

            <!-- ── PACKAGE MODE ── -->
            <div id="package-mode">
            <!-- Products -->
            <p class="section-title">Select Your Packages</p>
            <div class="products" id="products">

                <label class="product-card" onclick="toggleCard(this)">
                    <input type="checkbox" name="product" value="Weekend Burger &amp; Sausage Combo" data-price="45">
                    <div class="check-box">
                        <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <img class="product-img" src="images/burgers-sausage.jpg" alt="">
                    <div class="product-info">
                        <div class="product-name">The Weekend Burger &amp; Sausage Combo</div>
                        <div class="product-price">$45.00 CAD</div>
                    </div>
                    <div class="qty-wrap">
                        <span class="qty-label">Qty</span>
                        <select class="qty-select" onclick="event.stopPropagation()" onchange="updateTotal()" disabled>
                            <option>1</option><option>2</option><option>3</option>
                            <option>4</option><option>5</option><option>6</option>
                            <option>7</option><option>8</option><option>9</option><option>10</option>
                        </select>
                    </div>
                </label>

                <label class="product-card" onclick="toggleCard(this)">
                    <input type="checkbox" name="product" value="Ultimate Family BBQ Box" data-price="85">
                    <div class="check-box">
                        <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <img class="product-img" src="images/family-pack.jpg" alt="">
                    <div class="product-info">
                        <div class="product-name">The Ultimate Family BBQ Box</div>
                        <div class="product-price">$85.00 CAD</div>
                    </div>
                    <div class="qty-wrap">
                        <span class="qty-label">Qty</span>
                        <select class="qty-select" onclick="event.stopPropagation()" onchange="updateTotal()" disabled>
                            <option>1</option><option>2</option><option>3</option>
                            <option>4</option><option>5</option><option>6</option>
                            <option>7</option><option>8</option><option>9</option><option>10</option>
                        </select>
                    </div>
                </label>

                <label class="product-card" onclick="toggleCard(this)">
                    <input type="checkbox" name="product" value="Pitmaster's Choice Bundle" data-price="95">
                    <div class="check-box">
                        <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <img class="product-img" src="images/steak1.jpg" alt="">
                    <div class="product-info">
                        <div class="product-name">Pitmaster's Choice Bundle</div>
                        <div class="product-price">$95.00 CAD</div>
                    </div>
                    <div class="qty-wrap">
                        <span class="qty-label">Qty</span>
                        <select class="qty-select" onclick="event.stopPropagation()" onchange="updateTotal()" disabled>
                            <option>1</option><option>2</option><option>3</option>
                            <option>4</option><option>5</option><option>6</option>
                            <option>7</option><option>8</option><option>9</option><option>10</option>
                        </select>
                    </div>
                </label>

                <label class="product-card" onclick="toggleCard(this)">
                    <input type="checkbox" name="product" value="Tomahawk Premium Experience" data-price="120">
                    <div class="check-box">
                        <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <img class="product-img" src="images/tomahawk.jpg" alt="">
                    <div class="product-info">
                        <div class="product-name">The Tomahawk Premium Experience</div>
                        <div class="product-price">$120.00 CAD</div>
                    </div>
                    <div class="qty-wrap">
                        <span class="qty-label">Qty</span>
                        <select class="qty-select" onclick="event.stopPropagation()" onchange="updateTotal()" disabled>
                            <option>1</option><option>2</option><option>3</option>
                            <option>4</option><option>5</option><option>6</option>
                            <option>7</option><option>8</option><option>9</option><option>10</option>
                        </select>
                    </div>
                </label>

            </div>

            <!-- Total -->
            <div class="total-bar">
                <span class="total-label">Order Total</span>
                <span class="total-amount" id="total-display">$0.00 CAD</span>
            </div>

            </div><!-- end #package-mode -->

            <!-- ── CUSTOM REQUEST MODE ── -->
            <div id="custom-mode" style="display:none;">
                <p class="section-title">What Are You Looking For?</p>
                <div class="form-section">
                    <div class="fields">
                        <div class="field-group">
                            <label for="custom-cut">Cut / Item</label>
                            <input type="text" id="custom-cut" name="custom_cut" placeholder="e.g. AAA Ribeye, Pork Belly, Brisket…">
                        </div>
                        <div class="field-row">
                            <div class="field-group">
                                <label for="custom-qty">Quantity / Weight</label>
                                <input type="text" id="custom-qty" name="custom_qty" placeholder="e.g. 2 lbs, 4 pieces">
                            </div>
                            <div class="field-group">
                                <label for="custom-serves">Serves</label>
                                <input type="text" id="custom-serves" name="custom_serves" placeholder="e.g. 4 people">
                            </div>
                        </div>
                        <div class="field-group">
                            <label for="custom-notes">Special Instructions</label>
                            <textarea id="custom-notes" name="custom_notes" placeholder="Trim level, thickness, any prep notes, or questions for Shane…"></textarea>
                        </div>
                    </div>
                </div>
                <p class="section-title" style="margin-top:8px;">Preferred Pickup</p>
            </div><!-- end #custom-mode -->

            <!-- Pickup -->
            <div class="form-section">
                <p class="section-title">Pickup Details</p>
                <div class="fields">
                    <div class="field-group">
                        <label for="pickup-date">Pickup Date</label>
                        <input type="date" id="pickup-date" name="pickup_date" required onchange="updateTimeSlots()">
                    </div>
                    <div class="time-picker-wrap">
                        <span class="time-picker-label">Pickup Time</span>
                        <div class="time-slots" id="time-slots">
                            <!-- generated by JS -->
                        </div>
                        <input type="hidden" id="pickup-time" name="pickup_time">
                    </div>
                </div>
            </div>

            <!-- Contact -->
            <div class="form-section">
                <p class="section-title">Your Information</p>
                <div class="fields">
                    <div class="field-row">
                        <div class="field-group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="first_name" placeholder="Sarah" required>
                        </div>
                        <div class="field-group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="last_name" placeholder="Mitchell" required>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="(705) 555-0142" required>
                    </div>
                    <div class="field-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="sarah@example.com" required>
                    </div>
                    <div style="display: flex; align-items: flex-start; gap: 12px; margin-top: 4px;">
                        <input type="checkbox" id="subscribe" name="subscribe" value="yes"
                            style="width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; accent-color: var(--tan); cursor: pointer;">
                        <label for="subscribe" style="font-size: 13px; color: #888; text-transform: none; letter-spacing: 0; cursor: pointer; line-height: 1.5;">
                            Sign me up for promotions and updates from Burnett's Butcher Shop.
                        </label>
                    </div>
                </div>
            </div>

            <div class="error-msg" id="error-msg"></div>

            <button type="submit" class="submit-btn" id="submit-btn">Place Order</button>

        </form>
    </div>

    <script>
        // ── Mode toggle ──
        let currentMode = 'package';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('package-mode').style.display = mode === 'package' ? '' : 'none';
            document.getElementById('custom-mode').style.display  = mode === 'custom'  ? '' : 'none';
            document.getElementById('btn-package').classList.toggle('active', mode === 'package');
            document.getElementById('btn-custom').classList.toggle('active', mode === 'custom');
            document.getElementById('submit-btn').textContent = mode === 'package' ? 'Place Order' : 'Send Request';
            document.getElementById('error-msg').classList.remove('show');
        }

        // ── Product card toggle ──
        function toggleCard(label) {
            const cb  = label.querySelector('input[type="checkbox"]');
            const qty = label.querySelector('.qty-select');
            cb.checked = !cb.checked;
            label.classList.toggle('selected', cb.checked);
            qty.disabled = !cb.checked;
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.product-card').forEach(card => {
                const cb  = card.querySelector('input[type="checkbox"]');
                const qty = card.querySelector('.qty-select');
                if (cb.checked) total += parseFloat(cb.dataset.price) * parseInt(qty.value);
            });
            document.getElementById('total-display').textContent = '$' + total.toFixed(2) + ' CAD';
        }

        // ── Time slot picker ──
        const INTERVAL = 30; // minutes

        // Hours per day of week [open, close] in 24h — 0=Sun, 1=Mon, ..., 6=Sat
        const STORE_HOURS = {
            0: [9, 16],  // Sunday:    9:00am – 4:00pm
            1: [9, 17],  // Monday:    9:00am – 5:00pm
            2: [9, 18],  // Tuesday:   9:00am – 6:00pm
            3: [9, 18],  // Wednesday: 9:00am – 6:00pm
            4: [9, 18],  // Thursday:  9:00am – 6:00pm
            5: [9, 18],  // Friday:    9:00am – 6:00pm
            6: [9, 17],  // Saturday:  9:00am – 5:00pm
        };

        function buildSlots(open, close) {
            const slots = [];
            for (let h = open; h < close; h++) {
                for (let m = 0; m < 60; m += INTERVAL) {
                    const hour12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
                    const ampm   = h < 12 ? 'AM' : 'PM';
                    const label  = `${hour12}:${String(m).padStart(2,'0')} ${ampm}`;
                    const value  = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                    slots.push({ label, value });
                }
            }
            return slots;
        }

        function updateTimeSlots() {
            const dateVal  = document.getElementById('pickup-date').value;
            const wrap     = document.getElementById('time-slots');
            const hiddenIn = document.getElementById('pickup-time');

            wrap.innerHTML = '';
            hiddenIn.value = '';

            if (!dateVal) return;

            const selectedDate = new Date(dateVal + 'T00:00:00');
            const dayOfWeek    = selectedDate.getDay();
            const [open, close] = STORE_HOURS[dayOfWeek];
            const slots        = buildSlots(open, close);

            const now     = new Date();
            const isToday = selectedDate.toDateString() === now.toDateString();

            slots.forEach(slot => {
                const btn = document.createElement('button');
                btn.type        = 'button';
                btn.className   = 'time-slot';
                btn.textContent = slot.label;
                btn.dataset.value = slot.value;

                // Grey out past slots if today
                if (isToday) {
                    const [sh, sm] = slot.value.split(':').map(Number);
                    const slotDate = new Date();
                    slotDate.setHours(sh, sm, 0, 0);
                    if (slotDate <= now) {
                        btn.classList.add('unavailable');
                    }
                }

                btn.addEventListener('click', () => {
                    wrap.querySelectorAll('.time-slot').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    hiddenIn.value = slot.value;
                });

                wrap.appendChild(btn);
            });
        }

        // ── Form submit ──
        document.getElementById('order-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const errorEl = document.getElementById('error-msg');
            const btn     = document.getElementById('submit-btn');
            errorEl.classList.remove('show');

            const pickupDate = document.getElementById('pickup-date').value;
            const pickupTime = document.getElementById('pickup-time').value;
            const firstName  = document.getElementById('first-name').value.trim();
            const lastName   = document.getElementById('last-name').value.trim();
            const phone      = document.getElementById('phone').value.trim();
            const email      = document.getElementById('email').value.trim();

            if (!pickupDate) {
                errorEl.textContent = 'Please choose a pickup date.';
                errorEl.classList.add('show'); return;
            }
            if (!pickupTime) {
                errorEl.textContent = 'Please choose a pickup time.';
                errorEl.classList.add('show'); return;
            }

            // Format time for display (e.g. "14:30" → "2:30 PM")
            const [h, m]        = pickupTime.split(':').map(Number);
            const hr12          = h > 12 ? h - 12 : (h === 0 ? 12 : h);
            const ampm          = h < 12 ? 'AM' : 'PM';
            const pickupTimeDisplay = `${hr12}:${String(m).padStart(2,'0')} ${ampm}`;

            let payload;

            if (currentMode === 'package') {
                const selected = [...document.querySelectorAll('.product-card.selected input')];
                if (selected.length === 0) {
                    errorEl.textContent = 'Please select at least one package.';
                    errorEl.classList.add('show'); return;
                }
                const items = selected.map(cb => {
                    const qty = cb.closest('.product-card').querySelector('.qty-select').value;
                    return `${cb.value} x${qty}`;
                });
                const total = document.getElementById('total-display').textContent;
                payload = {
                    orderType: 'package',
                    customer: `${firstName} ${lastName}`,
                    first_name: firstName, last_name: lastName,
                    phone, email, items, pickupDate,
                    pickupTime: pickupTimeDisplay, total,
                    subscribe: document.getElementById('subscribe').checked,
                };
            } else {
                const cut    = document.getElementById('custom-cut').value.trim();
                const qty    = document.getElementById('custom-qty').value.trim();
                const serves = document.getElementById('custom-serves').value.trim();
                const notes  = document.getElementById('custom-notes').value.trim();
                if (!cut) {
                    errorEl.textContent = 'Please describe what you\'re looking for.';
                    errorEl.classList.add('show'); return;
                }
                payload = {
                    orderType: 'custom',
                    customer: `${firstName} ${lastName}`,
                    first_name: firstName, last_name: lastName,
                    phone, email, pickupDate,
                    pickupTime: pickupTimeDisplay,
                    cut, qty, serves, notes,
                    subscribe: document.getElementById('subscribe').checked,
                };
            }

            btn.disabled    = true;
            btn.textContent = currentMode === 'package' ? 'Placing Order...' : 'Sending Request...';

            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('Server error');
            } catch (err) {
                // Demo mode: show success regardless
            } finally {
                btn.disabled    = false;
                btn.textContent = currentMode === 'package' ? 'Place Order' : 'Send Request';
            }

            document.getElementById('order-form').style.display = 'none';
            const successEl = document.getElementById('success');
            successEl.classList.add('show');
            successEl.querySelector('h2').textContent = currentMode === 'package' ? 'Order Received!' : 'Request Sent!';
            successEl.querySelector('p').innerHTML = currentMode === 'package'
                ? `Thanks, <span>${firstName}</span>.<br>Your order is in — we'll be in touch<br>to confirm shortly.`
                : `Thanks, <span>${firstName}</span>.<br>We'll be in touch to confirm<br>availability and pickup details.`;
            document.getElementById('success-name').textContent = firstName;
        });

        // Init
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('pickup-date').min = today;
        document.getElementById('pickup-date').value = today;
        updateTimeSlots();
    </script>

</body>
</html>
